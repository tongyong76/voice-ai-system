version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: voice-ai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: voice_ai
      MYSQL_USER: ${MYSQL_USER:-voice_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-voice_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: voice-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: voice-ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: voice-ai-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: voice-ai-server
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-voice_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-voice_pass}
      - MYSQL_DATABASE=voice_ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      - AI_ENGINE_URL=http://ai-engine:8001
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./server:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # AI Inference Engine (GPU required)
  ai-engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: voice-ai-engine
    ports:
      - "8001:8001"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=voice-audio
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      - minio
    volumes:
      - ./ai_engine:/app
      - model_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  # Vue Frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: voice-ai-web
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mysql_data:
  redis_data:
  minio_data:
  es_data:
  model_cache:
